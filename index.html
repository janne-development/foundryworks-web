<style>
  :root {
    --navy: #0F2E50;
    --navy-light: #1B4070;
    --orange: #FF6600;
    --orange-hover: #e55a00;
    --bg: #F5F5F3;
    --white: #ffffff;
    --text: #1a1a1a;

  /* NAV */

  /* LANGUAGE SELECTOR */

    font-size: 0.82rem; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif;
    display: flex; align-items: center; gap: 0.4rem; transition: background 0.2s;
  }
  .lang-btn:hover { background: rgba(255,255,255,0.18); }
  .lang-dropdown {

    background: var(--white); border-radius: 6px; box-shadow: 0 8px 32px rgba(0,0,0,0.18);

  .hero p { font-size: 1.15rem; color: rgba(255,255,255,0.72); max-width: 560px; margin-bottom: 2.5rem; font-weight: 300; }
  .hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; }

  .btn-secondary { background: transparent; color: var(--white); padding: 0.85rem 2rem; border-radius: 4px; font-weight: 500; font-size: 0.95rem; text-decoration: none; border: 1.5px solid rgba(255,255,255,0.35); transition: border-color 0.2s, transform 0.15s; display: inline-block; cursor: pointer; }
  .btn-secondary:hover { border-color: var(--white); transform: translateY(-2px); }

  .stat-number { font-family: 'Fraunces', serif; font-size: 2.6rem; font-weight: 900; color: var(--navy); line-height: 1; }

  .stat-label { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; letter-spacing: 0.5px; margin-top: 0.35rem; text-transform: uppercase; }

  .page-hero p { color: rgba(255,255,255,0.72); font-size: 1.1rem; font-weight: 300; max-width: 520px; }

  .content-section { padding: 5rem 5%; max-width: 1100px; margin: 0 auto; }
  .content-block { margin-bottom: 4rem; }

  .content-block p { color: var(--text-muted); font-size: 1rem; max-width: 680px; margin-bottom: 1rem; }
  .feature-list { list-style: none; margin-top: 1.5rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1rem; }

  .form-group { margin-bottom: 1.2rem; }
  .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text); margin-bottom: 0.4rem; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.75rem 1rem; border: 1.5px solid var(--border); border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; color: var(--text); background: var(--bg); transition: border-color 0.2s; outline: none; }

  footer { background: #0a1f38; color: rgba(255,255,255,0.55); padding: 3rem 5%; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1.5rem; font-size: 0.88rem; }

  body.rtl .feature-list li { border-left: none; border-right: 3px solid var(--orange); }

  @media (max-width: 900px) {

  .btn-generate { background: var(--navy); color: var(--white); padding: 0.7rem 1.5rem; border-radius: 4px; border: none; font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; font-size: 0.9rem; transition: background 0.2s; }

  .admin-trigger { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--navy); color: rgba(255,255,255,0.3); border: none; border-radius: 50%; width: 42px; height: 42px; font-size: 1rem; cursor: pointer; z-index: 500; transition: color 0.2s; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }

</style>

let currentLang = 'en';
let currentPage = 'home';

function toggleLangMenu() {
  document.getElementById('langDropdown').classList.toggle('open');
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.lang-selector')) {
    document.getElementById('langDropdown').classList.remove('open');
  }
});

function setLang(lang) {
  currentLang = lang;
  document.getElementById('langDropdown').classList.remove('open');
  const l = languages[lang];
  document.getElementById('langBtn').textContent = `🌐 ${lang.toUpperCase()} ▾`;
  document.body.style.direction = l.dir;
  renderNav();
  renderPage(currentPage);
  buildLangDropdown();
}

function buildLangDropdown() {
  const dd = document.getElementById('langDropdown');
  dd.innerHTML = Object.entries(languages).map(([code, l]) =>
    `<div class="lang-option ${code === currentLang ? 'active' : ''}" onclick="setLang('${code}')">${l.flag} ${l.label}</div>`
  ).join('');
}

function renderNav() {
  const nav = t[currentLang].nav;
  document.getElementById('navLinks').innerHTML = `
    <li class="hide-mobile"><a onclick="showPage('jobs')">${nav.jobs}</a></li>
    <li class="hide-mobile"><a onclick="showPage('clients')">${nav.clients}</a></li>
    <li class="hide-mobile"><a onclick="showPage('seekers')">${nav.seekers}</a></li>
    <li class="hide-mobile"><a onclick="showPage('about')">${nav.about}</a></li>
    <li><a class="cta-nav" onclick="showPage('contact')">${nav.contact}</a></li>
  `;
}

function showPage(page) {
  currentPage = page;
  renderPage(page);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function footer(lang) {
  const txt = t[lang].home.footer;
  return `<footer>
    <div class="footer-logo">Foundry<span>works</span></div>
    <div>${txt}</div>
    <div><a href="mailto:hello@foundryworks.com">hello@foundryworks.com</a></div>
    <div>© 2025 Foundryworks</div>
  </footer>`;
}

    html = `

      <span class="eyebrow">${c.eyebrow}</span>

    <div class="content-section">

          <div class="contact-item"><span>✉️</span><a href="mailto:hello@foundryworks.com">hello@foundryworks.com</a></div>
          <div class="contact-item"><span>📞</span><a href="tel:+358000000000">+358 00 000 0000</a></div>
          <div class="contact-item"><span>🌍</span><span>${c.intl}</span></div>
        </div>
        <div class="contact-form">
          <h3>${c.formH}</h3>
          <div class="form-group"><label>${c.nameL}</label><input type="text" placeholder="${c.nameP}"></div>
          <div class="form-group"><label>${c.emailL}</label><input type="email" placeholder="${c.emailP}"></div>
          <div class="form-group"><label>${c.roleL}</label>
            <select><option>${c.role1}</option><option>${c.role2}</option><option>${c.role3}</option></select>
          </div>
          <div class="form-group"><label>${c.msgL}</label><textarea placeholder="${c.msgP}"></textarea></div>
          <button class="btn-submit">${c.send}</button>
        </div>
      </div>
    </div>
    ${footer(lang)}`;
  }

  const appDiv = document.getElementById('app');
  appDiv.innerHTML = `<div class="page active">${html}</div>`;
}

function initAdminDropdowns() {
  const sectorSel = document.getElementById('jobSector');
  const levelSel = document.getElementById('jobLevel');
  if (!sectorSel) return;
  sectorSel.innerHTML = '<option value="">Valitse sektori...</option>' +
    JOB_DATA.sectors.map(s => '<option value="' + s.id + '">' + s.emoji + ' ' + s.name + '</option>').join('');
  levelSel.innerHTML = '<option value="">Kaikki tasot</option>' +
    JOB_DATA.experience_levels.map(l => '<option value="' + l.id + '">' + l.label + '</option>').join('');
}

function updateRoleDropdown() {
  const sectorId = document.getElementById('jobSector').value;
  const roleSel = document.getElementById('jobTitle');
  const sector = JOB_DATA.sectors.find(function(s) { return s.id === sectorId; });
  if (!sector) {
    roleSel.innerHTML = '<option value="">Valitse ensin sektori...</option>';
    return;
  }
  roleSel.innerHTML = '<option value="">Valitse tehtävänimike...</option>' +
    sector.roles.map(function(r) { return '<option value="' + r + '">' + r + '</option>'; }).join('');
}

// ── ADMIN ──────────────────────────────────────────────────────
const ADMIN_PW = 'foundry2025';
// Safe storage - works even if localStorage is blocked (iOS private mode)
let jobs = [];
let generatedDescription = '';

function loadJobs() {
  try {
    jobs = JSON.parse(localStorage.getItem('fw_jobs') || '[]');
  } catch(e) {
    jobs = [];
  }
}

function saveJobs() {
  try {
    localStorage.setItem('fw_jobs', JSON.stringify(jobs));
  } catch(e) {
    // localStorage blocked - jobs stay in memory only
  }
}

loadJobs();

function openAdmin() {
  document.getElementById('adminOverlay').classList.remove('hidden');
  document.getElementById('adminPwInput').focus();
}

function showAdminPanel() {
  document.getElementById('adminLogin').classList.add('hidden');
  document.getElementById('adminPanel').classList.remove('hidden');
  initAdminDropdowns();
  renderAdminJobList();
  updateJobCount();
}

function closeAdmin() {
  document.getElementById('adminOverlay').classList.add('hidden');
  document.getElementById('adminLogin').classList.remove('hidden');
  document.getElementById('adminPanel').classList.add('hidden');
  document.getElementById('adminPwInput').value = '';
  resetForm();
}

function checkAdminPw() {
  const pw = document.getElementById('adminPwInput').value;
  if (pw === ADMIN_PW) {
    showAdminPanel();
  } else {
    const err = document.getElementById('adminError');
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 2500);
  }
}

function resetForm() {
  ['jobTitle','jobLocation','jobIndustry','jobDesc'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('jobType').selectedIndex = 0;
}

// Generate function removed - using manual input

function saveJob() {
  const title = document.getElementById('jobTitle').value.trim();
  const location = document.getElementById('jobLocation').value.trim();
  const type = document.getElementById('jobType').value;
  const description = document.getElementById('jobDesc').value.trim();

  if (!title || !location || !description) {
    alert('Täytä tehtävänimike, sijainti ja kuvaus.');
    return;
  }

  const job = {
    id: Date.now(),
    title,
    location,
    type,
    description,
    date: new Date().toLocaleDateString('fi-FI')
  };

  jobs.unshift(job);
  saveJobs();
  renderAdminJobList();
  updateJobCount();
  resetForm();
  renderPage(currentPage);
}

function deleteJob(id) {
  if (!confirm('Poistetaanko ilmoitus?')) return;
  jobs = jobs.filter(j => j.id !== id);
  saveJobs();
  renderAdminJobList();
  updateJobCount();
  renderPage(currentPage);
}

function updateJobCount() {
  const el = document.getElementById('jobCount');
  if (el) el.textContent = jobs.length;
}

function renderAdminJobList() {
  const list = document.getElementById('adminJobList');
  if (!list) return;
  if (jobs.length === 0) {
    list.innerHTML = '<p style="color:var(--text-muted);font-size:0.9rem;">Ei ilmoituksia vielä.</p>';
    return;
  }
  list.innerHTML = jobs.map(j => `
    <div class="admin-job-item">
      <div>
        <h4>${j.title}</h4>
        <p>${j.sector || ''} · 📍 ${j.location} · ${j.type}${j.level ? ' · ' + j.level : ''} · Lisätty ${j.date}</p>
      </div>
      <button class="btn-delete" onclick="deleteJob(${j.id})">Poista</button>
    </div>
  `).join('');
}
